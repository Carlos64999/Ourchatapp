<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Little Chat 💖</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #fff0f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      font-size: 2em;
      color: #ff69b4;
      text-align: center;
      margin-bottom: 20px;
      font-family: 'Comic Sans MS', cursive, sans-serif;
    }
    #name-form, #chat-container {
      width: 100%;
      max-width: 500px;
      margin-top: 20px;
    }
    #chat-box {
      width: 100%;
      height: 400px;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      overflow-y: scroll;
      background-color: #fff;
      display: flex;
      flex-direction: column;
    }
    .message {
      padding: 8px 12px;
      margin: 5px 0;
      border-radius: 15px;
      max-width: 70%;
      word-wrap: break-word;
    }
    .me {
      background-color: #dcf8c6;
      align-self: flex-end;
    }
    .her {
      background-color: #ffb6c1;
      align-self: flex-start;
    }
    #message-input {
      width: 80%;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
      margin-right: 5px;
    }
    #send-btn {
      padding: 10px 20px;
      border: none;
      background-color: #4CAF50;
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }
    #input-area {
      display: flex;
      width: 100%;
      margin-top: 10px;
    }
    #name-input {
      width: 70%;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }
    #start-btn {
      padding: 10px 20px;
      border: none;
      background-color: #ff69b4;
      color: white;
      border-radius: 20px;
      cursor: pointer;
      margin-left: 5px;
    }
  </style>
</head>
<body>

<h1>Our Little Chat 💖</h1>

<div id="name-form">
  <input type="text" id="name-input" placeholder="Enter your name" />
  <button id="start-btn">Start Chat</button>
</div>

<div id="chat-container" style="display: none;">
  <div id="chat-box"></div>
  <div id="input-area">
    <input type="text" id="message-input" placeholder="Type a message..." />
    <button id="send-btn">Send</button>
  </div>
</div>

<script type="module">
  // Firebase v9+ imports
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics.js";
  import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  // NEW Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyAm_ZmME2Pl8lHNVK7XeCpbdAmcbQMv5Qc",
    authDomain: "ourchatapp-11a6d.firebaseapp.com",
    projectId: "ourchatapp-11a6d",
    storageBucket: "ourchatapp-11a6d.firebasestorage.app",
    messagingSenderId: "718713422522",
    appId: "1:718713422522:web:41ca3ad21a5c8f2d087883",
    measurementId: "G-LR35TJM2LF"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getDatabase(app);

  // DOM elements
  const startBtn = document.getElementById('start-btn');
  const nameInput = document.getElementById('name-input');
  const nameForm = document.getElementById('name-form');
  const chatContainer = document.getElementById('chat-container');
  const chatBox = document.getElementById('chat-box');
  const messageInput = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');

  // Generate unique device ID for left/right alignment
  let deviceId = localStorage.getItem('deviceId');
  if (!deviceId) {
    deviceId = 'device-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
    localStorage.setItem('deviceId', deviceId);
  }

  // Persistent username
  let username = localStorage.getItem('username') || '';

  function startChat() {
    nameForm.style.display = 'none';
    chatContainer.style.display = 'block';
    if (!username) {
      username = nameInput.value.trim();
      localStorage.setItem('username', username);
    }
  }

  if (username) startChat();

  startBtn.addEventListener('click', () => {
    if (nameInput.value.trim()) {
      username = nameInput.value.trim();
      localStorage.setItem('username', username);
      startChat();
    }
  });

  sendBtn.addEventListener('click', () => {
    const text = messageInput.value.trim();
    if (!text) return;

    push(ref(db, 'chat'), {
      senderId: deviceId,
      user: username,
      text: text,
      timestamp: Date.now()
    });

    messageInput.value = '';
  });

  // Listen for new messages
  onChildAdded(ref(db, 'chat'), (snapshot) => {
    const message = snapshot.val();
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message');
    msgDiv.classList.add(message.senderId === deviceId ? 'me' : 'her');
    msgDiv.textContent = message.text;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
  });
</script>

</body>
</html>
